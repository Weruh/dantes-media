services:
  - type: web
    name: dantes-media
    env: node
    rootDir: .
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PAYSTACK_CURRENCY
        value: KES
      - key: FRONTEND_URL
        value: https://dantesmediasolution.com
      - key: CORS_ORIGINS
        value: https://dantesmediasolution.com,https://www.dantesmediasolution.com
      - key: PAYSTACK_CALLBACK_URL
        value: https://dantesmediasolution.com/checkout/verify
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SELLER_NOTIFY_EMAIL
        sync: false
      - key: CONTACT_NOTIFY_EMAIL
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_FROM
        sync: false
      - key: BREVO_REPLY_TO
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: RESEND_REPLY_TO
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_RECIPIENT_PHONE
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v23.0
      - key: WHATSAPP_WEBHOOK_URL
        sync: false

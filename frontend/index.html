<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/dantes%20logo2.0.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Dantes Media Solution provides ICT infrastructure, networking, security systems, hardware supply, and responsive technical support."
    />
    <meta name="theme-color" content="#0f172a" />
    <title>Dantes Media Solution</title>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const redirectedPath = params.get("ghp_path");
        if (!redirectedPath) return;

        const redirectedQuery = params.get("ghp_query");
        const nextUrl =
          `/${redirectedPath}` +
          (redirectedQuery ? `?${redirectedQuery}` : "") +
          window.location.hash;

        window.history.replaceState(null, "", nextUrl);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dantes Media Solution</title>
    <script>
      (() => {
        const { origin, pathname, search, hash } = window.location;
        const redirect = new URL("/", origin);

        redirect.searchParams.set("ghp_path", pathname.replace(/^\/+/, ""));
        if (search.length > 1) {
          redirect.searchParams.set("ghp_query", search.slice(1));
        }

        window.location.replace(`${redirect.toString()}${hash}`);
      })();
    </script>
  </head>
  <body></body>
</html>
